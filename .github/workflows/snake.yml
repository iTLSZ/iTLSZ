name: Generate Snake

on:
  schedule:
    # cada 12 horas
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: iTLSZ
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=#6366F1
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#6366F1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
